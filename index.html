<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Travel Adviser — plan your next trip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="kicker">Plan • Track • Split</div>
      <h1>Travel <em>Adviser</em></h1>
      <p>Build your next trip one anchor at a time — tickets, hotels, day-by-day itinerary, and fair bill splitting.</p>
    </div>
  </header>

  <main>
    <form id="trip-form" class="card card-lg">
      <div class="grid-2">
        <label style="grid-column: 1 / -1">
          <span>Destination</span>
          <input name="destination" list="cities" required style="width:100%">
          <datalist id="cities">
            <option value="Phan Thiet"><option value="Da Nang">
            <option value="Nha Trang"><option value="Phu Quoc">
            <option value="Ha Noi"><option value="Sa Pa">
            <option value="Hoi An"><option value="Da Lat">
          </datalist>
        </label>

        <label>
          <span>Transport</span>
          <select name="transport" style="width:100%">
            <option value="bus">Bus</option>
            <option value="air">Air</option>
            <option value="motorcycle">Motorcycle</option>
            <option value="train">Train</option>
          </select>
        </label>

        <label>
          <span>Trip type</span>
          <select name="tripType" style="width:100%">
            <option value="beach">Beach</option>
            <option value="mountain">Mountain</option>
            <option value="city">City</option>
            <option value="food">Food</option>
            <option value="mixed">Mixed</option>
          </select>
        </label>

        <label>
          <span>Days</span>
          <input type="number" name="days" min="1" value="3" required style="width:100%">
        </label>

        <label>
          <span>People</span>
          <input type="number" name="people" min="1" value="2" required style="width:100%">
        </label>

        <label>
          <span>Start date</span>
          <input type="date" name="startDate" required style="width:100%">
        </label>

        <label>
          <span>Budget (VND)</span>
          <select name="budgetRange" style="width:100%">
            <option value="<5M">Under 5M</option>
            <option value="5-15M">5–15M</option>
            <option value="15-40M">15–40M</option>
            <option value=">40M">Over 40M</option>
          </select>
        </label>
      </div>

      <div class="row" style="gap:.75rem; margin-top: 1.25rem;">
        <button type="submit" name="mode" value="new" class="btn btn-primary" style="flex:1">
          Create new plan
        </button>
        <button type="submit" name="mode" value="template" class="btn btn-accent" style="flex:1">
          Refer to a good plan
        </button>
      </div>
    </form>

    <section style="margin-top: 2rem;">
      <div class="kicker">your library</div>
      <h2 style="margin: .25rem 0 1rem;">My saved trips</h2>
      <div id="saved-trips" class="stack"></div>
    </section>
  </main>

  <dialog id="template-modal" style="border:none; border-radius:16px; padding:0; max-width:36rem; width:92%;">
    <div class="card">
      <h2 style="margin:0 0 1rem;">Choose a template</h2>
      <div id="template-list" class="stack"></div>
      <button id="template-close" class="btn btn-outline btn-sm" style="margin-top: 1rem;">Cancel</button>
    </div>
  </dialog>

  <script type="module" src="js/main.js"></script>
</body>
</html>
