<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Travel Adviser — Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="nav-top">
    <div class="nav-inner row">
      <a href="index.html" class="home-btn" title="Back to home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12 L12 3 L21 12"/><path d="M5 10 V20 a1 1 0 0 0 1 1 h4 v-6 h4 v6 h4 a1 1 0 0 0 1 -1 V10"/>
        </svg>
      </a>
      <h1 id="trip-title" style="font-size:1.15rem; margin:0; flex:1; font-family:inherit; color:var(--brown-dk);">Trip</h1>
      <div class="row-wrap">
        <button id="packing-trip" class="btn btn-outline btn-sm" title="Generate packing checklist">🎒 Packing</button>
        <button id="ics-trip"     class="btn btn-outline btn-sm" title="Download calendar (.ics) — import to Google Calendar">📅 Calendar</button>
        <button id="print-trip"   class="btn btn-outline btn-sm" title="Printable view">🖨 Print</button>
        <button id="export-trip"  class="btn btn-outline btn-sm" title="Download as JSON file">Export</button>
        <button id="import-trip"  class="btn btn-outline btn-sm" title="Load a trip from JSON file">Import</button>
        <button id="share-trip"   class="btn btn-outline btn-sm" title="Copy a shareable link">Share</button>
        <button id="save-trip"    class="btn btn-primary btn-sm">Save trip</button>
      </div>
    </div>
    <div id="overview" class="nav-inner muted" style="padding-top:0; padding-bottom:.5rem;"></div>
    <nav class="nav-inner tab-bar" style="padding-top:0; padding-bottom:0;">
      <button data-tab="plan" class="tab-btn active">Planning</button>
      <button data-tab="fees" class="tab-btn">Trip Fee</button>
    </nav>
  </header>

  <main class="wide">
    <section id="tab-plan"></section>
    <section id="tab-fees" hidden></section>
  </main>

  <script type="module" src="js/plan.js"></script>
</body>
</html>
