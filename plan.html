<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Travel Adviser — Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="nav-top">
    <div style="max-width: 56rem; margin: 0 auto; padding: .75rem 1.5rem;" class="row">
      <a href="index.html" class="btn-ghost" style="font-weight:600;">← Home</a>
      <h1 id="trip-title" style="font-size:1.15rem; margin: 0; flex: 1; font-family: inherit; color: var(--brown-dk);">Trip</h1>
      <button id="save-trip" class="btn btn-primary btn-sm">Save</button>
    </div>
    <div id="overview" style="max-width: 56rem; margin: 0 auto; padding: 0 1.5rem .5rem;" class="muted"></div>
    <nav style="max-width: 56rem; margin: 0 auto; padding: 0 1.5rem;" class="tab-bar">
      <button data-tab="plan" class="tab-btn active">Planning</button>
      <button data-tab="fees" class="tab-btn">Trip Fee</button>
    </nav>
  </header>

  <main>
    <section id="tab-plan"></section>
    <section id="tab-fees" hidden></section>
  </main>

  <script type="module" src="js/plan.js"></script>
</body>
</html>
