<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Travel Adviser — Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="sticky top-0 bg-white shadow z-20">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center gap-4">
      <a href="index.html" class="text-sky-600 font-semibold">← Home</a>
      <h1 id="trip-title" class="text-lg font-bold flex-1">Trip</h1>
      <button id="save-trip"
              class="px-3 py-1 bg-emerald-600 text-white rounded-lg">Save</button>
    </div>
    <div id="overview" class="max-w-5xl mx-auto px-6 pb-2 text-sm text-gray-600"></div>
    <nav class="max-w-5xl mx-auto px-6 flex gap-4 border-t">
      <button data-tab="plan" class="tab-btn py-2 border-b-2 border-sky-500 font-semibold">Planning</button>
      <button data-tab="fees" class="tab-btn py-2 border-b-2 border-transparent">Trip Fee</button>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6">
    <section id="tab-plan"></section>
    <section id="tab-fees" class="hidden"></section>
  </main>

  <script type="module" src="js/plan.js"></script>
</body>
</html>
